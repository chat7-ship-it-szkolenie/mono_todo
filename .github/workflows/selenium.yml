name: Selenium E2E

on:
  push:
    branches: [main]
    paths:
      - "services/backend/**"
      - "services/frontend/**"
      - "services/selenium/**"
      - ".github/workflows/selenium.yml"
  pull_request:
    paths:
      - "services/backend/**"
      - "services/frontend/**"
      - "services/selenium/**"
      - ".github/workflows/selenium.yml"
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      JWT_SECRET_KEY: ci-e2e-secret-not-for-production
      DATABASE_URL: sqlite:///./e2e.db
      BASE_URL: http://localhost:5173
      AUTH_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      # ── Backend ─────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/backend/requirements.txt

      - name: Install backend dependencies
        working-directory: services/backend
        run: pip install -r requirements.txt

      - name: Run backend migrations
        working-directory: services/backend
        run: alembic upgrade head

      - name: Start backend
        working-directory: services/backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"

      # ── Frontend ─────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: services/frontend
        run: npm ci

      - name: Build frontend
        working-directory: services/frontend
        run: npm run build

      - name: Start frontend (vite preview)
        working-directory: services/frontend
        run: |
          npx vite preview --port 5173 --host &
          echo "FRONTEND_PID=$!" >> "$GITHUB_ENV"

      # ── Wait for services ────────────────────────────────────────────────────
      - name: Wait for backend
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      - name: Wait for frontend
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:5173 && break
            sleep 2
          done

      # ── Selenium tests ───────────────────────────────────────────────────────
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install selenium dependencies
        working-directory: services/selenium
        run: pip install -r requirements.txt

      - name: Run E2E tests
        working-directory: services/selenium
        env:
          CHROME_HEADLESS: "1"
        run: pytest -v --tb=short

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: services/selenium/screenshots/
          retention-days: 7
